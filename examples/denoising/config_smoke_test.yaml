# Denoising - Smoke Test Configuration
# Ultra-fast test with minimal rollouts: 8 samples × 2 groups = 16 samples/step

# ============================================================================
# Model Configuration
# ============================================================================
model_name: "Qwen/Qwen3-8B"
local_model_path: "/workspace/home/asherding/models/Qwen3-8B"
renderer_name: "qwen3"
use_local_backend: true

# ============================================================================
# GPU Allocation
# ============================================================================
inference_gpu_id: 0
training_gpu_id: 4
training_gpu_ids: [4, 5, 6, 7]
inference_tp_size: 4
max_model_len: 32768
max_train_seq_len: 32768

# ============================================================================
# Training Hyperparameters (SMOKE TEST - Minimal)
# ============================================================================
group_size: 4
groups_per_batch: 2
num_epochs: 1
phase1_max_tokens: 26000
kl_penalty_coef: 0.1
lora_rank: 32
learning_rate: 4.0e-5
training_batch_size: 1
temperature: 1.0
save_every: 1

# ============================================================================
# Environment Configuration
# ============================================================================
num_cpus_per_task: 1
eval_timeout: 530

# ============================================================================
# Experiment Tracking
# ============================================================================
experiment_name: "denoising-smoke"
wandb_project: "denoising"
