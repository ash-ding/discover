# AHC - Validation Configuration (1 epoch)
# Competitive programming task

# ============================================================================
# Model Configuration
# ============================================================================
model_name: "Qwen/Qwen3-8B"
local_model_path: "/workspace/home/asherding/models/Qwen3-8B"
renderer_name: "qwen3"
use_local_backend: true

# ============================================================================
# GPU Allocation
# ============================================================================
inference_gpu_id: 0
training_gpu_id: 4
inference_tp_size: 4
max_model_len: 32768
max_train_seq_len: 8192   # Reduced to 8192 to avoid OOM (samples ~13400 tokens)

# ============================================================================
# Training Hyperparameters (AHC-specific values differ from other tasks)
# ============================================================================
group_size: 64
groups_per_batch: 8
num_epochs: 1                        # VALIDATION: 1 epoch (paper uses 50)
phase1_max_tokens: 22000             # AHC uses 22000 (vs 26000 for other tasks)
kl_penalty_coef: 0.01                # AHC uses 0.01 (vs 0.1 for other tasks)
lora_rank: 32
learning_rate: 2.0e-5                # AHC uses 2e-5 (vs 4e-5 for other tasks)
temperature: 1.0
save_every: 1
training_batch_size: 1

# ============================================================================
# Environment Configuration
# ============================================================================
num_cpus_per_task: 1
eval_timeout: 600

# ============================================================================
# Experiment Tracking
# ============================================================================
experiment_name: "ahc-validate"
wandb_project: "ahc"

