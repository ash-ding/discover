# GPU Mode - Smoke Test Configuration
# Ultra-fast test with minimal rollouts: 8 samples × 2 groups = 16 samples/step

# ============================================================================
# Model Configuration
# ============================================================================
model_name: "Qwen/Qwen3-8B"
local_model_path: "/workspace/home/asherding/models/Qwen3-8B"
renderer_name: "qwen3"
use_local_backend: true

# ============================================================================
# GPU Allocation
# ============================================================================
inference_gpu_id: 0
training_gpu_id: 4
inference_tp_size: 4
max_model_len: 32768
max_train_seq_len: 8192   # Further reduced to avoid OOM (was 16384)

# ============================================================================
# Training Hyperparameters (SMOKE TEST - Minimal)
# ============================================================================
group_size: 8                        # SMOKE TEST: 8 samples (vs 64)
groups_per_batch: 2                  # SMOKE TEST: 2 prompts (vs 8)
num_epochs: 1
phase1_max_tokens: 26000
kl_penalty_coef: 0.01                # GPU Mode uses 0.01 (vs 0.1 for other tasks)
lora_rank: 32
learning_rate: 4.0e-5
temperature: 1.0
save_every: 1
training_batch_size: 1               # Reduced to 1 to avoid OOM

# ============================================================================
# Environment Configuration
# ============================================================================
num_cpus_per_task: 1
eval_timeout: 300

# ============================================================================
# GPU Kernel Evaluation Backend (Local Only)
# ============================================================================
# Local evaluation runs on GPU 5, requires 6 GPUs total (0-3 inference, 4 training, 5 eval)
kernel_eval_gpu: 5                      # GPU ID for local evaluation
kernel_eval_use_container: false        # Container disabled due to disk space (8GB+ needed)
kernel_eval_timeout: 300                # Timeout per kernel (seconds)
kernel_eval_retries: 2                  # Max retries on failure

# ============================================================================
# Experiment Tracking
# ============================================================================
experiment_name: "gpu-mode-smoke"
wandb_project: "gpu-mode"
