# GPU Mode - Validation Configuration (1 epoch)
# Kernel optimization task

# ============================================================================
# Model Configuration
# ============================================================================
model_name: "Qwen/Qwen3-8B"
local_model_path: "/workspace/home/asherding/models/Qwen3-8B"
renderer_name: "qwen3"
use_local_backend: true

# ============================================================================
# GPU Allocation
# ============================================================================
inference_gpu_id: 0
training_gpu_id: 4
training_gpu_ids: [4, 5, 6, 7]
inference_tp_size: 4
max_model_len: 32768
max_train_seq_len: 16384  # Reduced from 32768 to avoid OOM with bs=2

# ============================================================================
# Training Hyperparameters
# ============================================================================
group_size: 64
groups_per_batch: 8
num_epochs: 1
phase1_max_tokens: 26000
kl_penalty_coef: 0.01
lora_rank: 32
learning_rate: 4.0e-5
temperature: 1.0
save_every: 1
training_batch_size: 1

# ============================================================================
# Environment Configuration
# ============================================================================
num_cpus_per_task: 1
eval_timeout: 300

# ============================================================================
# GPU Kernel Evaluation Backend (Local Only)
# ============================================================================
# Local evaluation runs on GPU 5, requires 6 GPUs total (0-3 inference, 4 training, 5 eval)
kernel_eval_gpu: 5                      # GPU ID for local evaluation
kernel_eval_use_container: false        # Container isolation (requires Podman/Docker)
kernel_eval_timeout: 300                # Timeout per kernel (seconds)
kernel_eval_retries: 2                  # Max retries on failure

# ============================================================================
# Experiment Tracking
# ============================================================================
experiment_name: "gpu-mode-validate"
wandb_project: "gpu-mode"

# ============================================================================
# vLLM Server Configuration
# ============================================================================
