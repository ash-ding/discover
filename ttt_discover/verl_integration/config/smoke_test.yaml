# Smoke test config: 1 epoch, minimal samples
# For quick code validation

model_name: "Qwen/Qwen3-8B"
lora_rank: 32
max_model_len: 32768

n_gpus: 8
inference_tp_size: 4
ulysses_sp_size: 4
gpu_memory_utilization: 0.4

learning_rate: 4.0e-5
clip_ratio: 1000.0
total_epochs: 1
temperature: 1.0

group_size: 4
groups_per_batch: 2
kl_coef: 0.1
phase1_max_tokens: 26000

env_module: "examples.circle_packing.env"
env_class: "CirclePackingEnv"
problem_type: "26"

eval_timeout: 530
num_cpus_per_task: 1

puct_c: 1.0
topk_children: 2
max_buffer_size: 100
max_prompt_length: 4096

log_dir: "./tinker_log"
experiment_name: "smoke-test-verl"
wandb_project: "ttt-discover"
wandb_mode: "disabled"
save_freq: 1

puct_file_path: "./tinker_log/puct_sampler_smoke.json"
